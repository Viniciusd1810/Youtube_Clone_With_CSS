<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube_Clone_With_CSS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <div class="left">
            <img class="menu" src="assets/images/menu-button.png" alt="menu">
            <a href="index.html"><img class="logo" src="assets/images/logo.png" alt="logo_youtube"></a>
        </div>

        <div class="center">
            <input class="search-bar" type="text" placeholder="Search">
            <button class="search-button"><img class="search-icon" src="assets/images/search-icon.png"></button>
        </div>

        <div class="right">
            <button class="create-button"><img class="plus" src="assets/images/plus-video-icon.png" alt="user icon">Create</button>
            <img class="notification-button" src="assets/images/notification-button.png" alt="notification button">
            <img class="user-icon" src="assets/images/user-icon.png" alt="user icon">
        </div>
    </header>
    <main>
        <a href="video-page-1.html">VIDEO</a>
    </main>

</html>
